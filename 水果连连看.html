<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>水果连连看</title>
<style>
:root {
  --color-primary:       #4A90D9;
  --color-primary-light: #EBF4FF;
  --color-primary-dark:  #2C6FAC;
  --color-accent:        #F5A623;
  --color-accent-light:  #FFF8EC;
  --gray-50:  #F8F9FA;
  --gray-100: #F1F3F5;
  --gray-200: #E9ECEF;
  --gray-300: #DEE2E6;
  --gray-400: #CED4DA;
  --gray-500: #ADB5BD;
  --gray-600: #6C757D;
  --gray-700: #495057;
  --gray-900: #212529;
  --color-success: #28A745;
  --color-danger:  #DC3545;
  --color-warning: #FFC107;
  --color-info:    #17A2B8;
  --font-sans: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  --font-mono: "SF Mono", "Consolas", "Courier New", monospace;
  --font-regular: 400;
  --font-medium:  500;
  --font-bold:    700;
  --text-xs:   12px;
  --text-sm:   14px;
  --text-base: 16px;
  --text-lg:   20px;
  --text-xl:   24px;
  --text-2xl:  32px;
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  20px;
  --space-6:  24px;
  --space-8:  32px;
  --space-10: 40px;
  --space-12: 48px;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.10), 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.12), 0 2px 4px rgba(0,0,0,0.08);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.16), 0 4px 12px rgba(0,0,0,0.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--gray-50);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── 顶栏 ── */
.header {
  width: 100%;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  box-shadow: var(--shadow-sm);
  position: relative;
  flex-shrink: 0;
}
.header h1 {
  font-size: var(--text-2xl);
  font-weight: var(--font-bold);
  color: var(--gray-900);
  letter-spacing: 2px;
}
.sound-btn {
  position: absolute;
  right: var(--space-4);
  width: 40px; height: 40px;
  background: var(--gray-100);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  transition: background 150ms;
}
.sound-btn:hover { background: var(--gray-200); }

/* ── 主内容区 ── */
.main {
  width: 100%;
  max-width: 800px;
  padding: var(--space-4) var(--space-4) var(--space-8);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-5);
}

/* ── HUD 工具栏 ── */
.hud {
  width: 100%;
  max-width: 660px;
  height: 72px;
  background: #fff;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--space-4);
  gap: var(--space-4);
}
.hud-left {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}
.timer-icon { font-size: 20px; color: var(--gray-500); }
.timer {
  font-family: var(--font-mono);
  font-size: var(--text-lg);
  font-weight: var(--font-bold);
  color: var(--gray-900);
  min-width: 52px;
  transition: color 300ms;
}
.timer.warning {
  color: var(--color-warning);
  animation: timerPulse 1s ease-in-out infinite;
}
.timer.danger {
  color: var(--color-danger);
  animation: timerPulse 500ms ease-in-out infinite;
}
@keyframes timerPulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.55; }
}

.hud-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.level-badge {
  font-size: var(--text-base);
  font-weight: var(--font-bold);
  color: var(--color-primary);
  line-height: 1;
}
.level-label {
  font-size: var(--text-xs);
  color: var(--gray-500);
  line-height: 1;
}
.hud-right {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}
.score-group {
  text-align: right;
  line-height: 1.2;
}
.score-label {
  font-size: var(--text-xs);
  color: var(--gray-500);
  font-weight: var(--font-regular);
}
.score-value {
  font-family: var(--font-mono);
  font-size: var(--text-lg);
  font-weight: var(--font-bold);
  color: var(--gray-900);
}

/* 图标按钮 */
.icon-btn {
  position: relative;
  width: 40px; height: 40px;
  background: var(--gray-100);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  transition: background 150ms, transform 120ms;
}
.icon-btn:hover { background: var(--gray-200); transform: translateY(-1px); }
.icon-btn:active { transform: translateY(0); }
.icon-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  transform: none;
}
.icon-btn .badge {
  position: absolute;
  top: -4px; right: -4px;
  min-width: 16px; height: 16px;
  background: #fff;
  border: 1.5px solid var(--color-primary);
  border-radius: 8px;
  font-size: 10px;
  font-weight: var(--font-bold);
  color: var(--color-primary);
  display: flex; align-items: center; justify-content: center;
  padding: 0 3px;
}

/* ── 棋盘容器 ── */
.board-wrapper {
  position: relative;
  width: 100%;
  max-width: 660px;
  display: flex;
  justify-content: center;
}

/* Toast 无路可走 */
.no-moves-toast {
  position: absolute;
  top: -56px;
  left: 0; right: 0;
  height: 48px;
  background: #FFFBF0;
  border: 1px solid var(--color-warning);
  border-radius: var(--radius-md);
  display: none;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--space-4);
  gap: var(--space-3);
  font-size: var(--text-sm);
  color: var(--gray-700);
  z-index: 20;
  animation: slideDown 200ms ease;
}
.no-moves-toast.show { display: flex; }
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.toast-left { display: flex; align-items: center; gap: var(--space-2); }
.toast-actions { display: flex; align-items: center; gap: var(--space-2); }
.toast-close {
  background: none; border: none; cursor: pointer;
  font-size: 16px; color: var(--gray-500); line-height: 1;
}
.toast-shuffle-btn {
  background: var(--color-warning);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: var(--text-xs);
  font-weight: var(--font-medium);
  padding: 4px 10px;
  cursor: pointer;
}
.toast-shuffle-btn:hover { opacity: 0.85; }

/* ── 棋盘 ── */
.board {
  display: grid;
  grid-template-columns: repeat(8, var(--tile-size, 72px));
  grid-template-rows:    repeat(8, var(--tile-size, 72px));
  gap: var(--tile-gap, 6px);
  background: var(--gray-100);
  border-radius: var(--radius-lg);
  padding: var(--space-3);
  box-shadow: var(--shadow-md);
  user-select: none;
  font-size: 36px; /* 默认大小，JS fitBoardToScreen 会覆盖 */
}

/* ── 牌格 ── */
.tile {
  width: var(--tile-size, 72px);
  height: var(--tile-size, 72px);
  background: var(--gray-100);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: inherit;
  transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease, background 120ms ease;
  will-change: transform;
}
.tile:hover:not(.tile--empty):not(.tile--animating) {
  transform: translateY(-1px);
  border-color: var(--color-primary);
  background: #E8F0FE;
}
.tile--selected {
  background: var(--color-primary-light) !important;
  border: 2px solid var(--color-primary) !important;
  box-shadow: 0 0 0 3px rgba(74,144,217,0.25) !important;
  transform: scale(1.04) !important;
}
.tile--hint {
  background: var(--color-accent-light) !important;
  border: 2px solid var(--color-accent) !important;
  box-shadow: 0 0 0 3px rgba(245,166,35,0.30) !important;
  animation: hintPulse 600ms ease-in-out 3 !important;
}
.tile--invalid {
  border: 2px solid var(--color-danger) !important;
  box-shadow: 0 0 0 3px rgba(220,53,69,0.20) !important;
  animation: shakeX 300ms ease !important;
}
.tile--matched {
  background: var(--color-primary-light) !important;
  border: 2px solid var(--color-primary) !important;
}
.tile--empty {
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  cursor: default !important;
  pointer-events: none;
}
.tile--disappear {
  animation: disappear 150ms ease forwards !important;
}

@keyframes shakeX {
  0%, 100% { transform: translateX(0); }
  20%       { transform: translateX(-6px); }
  40%       { transform: translateX(6px); }
  60%       { transform: translateX(-4px); }
  80%       { transform: translateX(4px); }
}
@keyframes hintPulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.45; }
}
@keyframes disappear {
  from { transform: scale(1); opacity: 1; }
  to   { transform: scale(0); opacity: 0; }
}
@keyframes tileAppear {
  from { transform: scale(0.88); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}

/* ── SVG 连线层 ── */
#line-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
  overflow: visible;
}

/* ── 底部按钮 ── */
.bottom-bar {
  display: flex;
  gap: var(--space-3);
}
.btn-primary {
  height: 44px;
  padding: 0 var(--space-6);
  background: var(--color-primary);
  color: var(--gray-50);
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  font-weight: var(--font-medium);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 150ms ease, transform 120ms ease;
}
.btn-primary:hover  { background: var(--color-primary-dark); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  height: 44px;
  padding: 0 var(--space-5);
  background: var(--gray-50);
  color: var(--gray-700);
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  font-weight: var(--font-medium);
  border: 1.5px solid var(--gray-300);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 150ms ease, border-color 150ms ease, transform 120ms ease;
}
.btn-secondary:hover {
  background: var(--gray-100);
  border-color: var(--gray-400);
  transform: translateY(-1px);
}

/* ── 弹窗 ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.50);
  backdrop-filter: blur(2px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms;
}
.overlay.show {
  opacity: 1;
  pointer-events: all;
}
.modal {
  max-width: 400px;
  width: calc(100% - 32px);
  padding: var(--space-8);
  background: #fff;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-4);
  text-align: center;
  animation: modalIn 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.88); }
  to   { opacity: 1; transform: scale(1); }
}
/* ── Confetti 彩条 ── */
.confetti-piece {
  position: fixed;
  top: -12px;
  pointer-events: none;
  z-index: 9998;
  border-radius: 2px;
  animation: confettiFall var(--cf-dur, 1.2s) var(--cf-delay, 0s) cubic-bezier(0.23, 1, 0.32, 1) forwards;
  transform-origin: center center;
}
@keyframes confettiFall {
  0% {
    transform: translate(0, 0) rotate(var(--cf-rot0, 0deg)) scaleX(1);
    opacity: 1;
  }
  80% { opacity: 1; }
  100% {
    transform: translate(var(--cf-tx, 0px), var(--cf-ty, 100vh)) rotate(var(--cf-rot1, 720deg)) scaleX(0.4);
    opacity: 0;
  }
}
.modal-icon {
  width: 64px; height: 64px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
}
.modal-icon.success { background: #E8F5E9; }
.modal-icon.danger  { background: #FFEBEE; }
.modal-title {
  font-size: var(--text-xl);
  font-weight: var(--font-bold);
  line-height: 1.2;
}
.modal-title.success { color: var(--color-success); }
.modal-title.danger  { color: var(--color-danger); }
.modal-sub {
  font-size: var(--text-base);
  color: var(--gray-600);
}
.modal-stats {
  display: flex;
  gap: var(--space-6);
  width: 100%;
  justify-content: center;
}
.stat-item { text-align: center; }
.stat-label {
  font-size: var(--text-xs);
  color: var(--gray-500);
  margin-bottom: 4px;
}
.stat-value {
  font-family: var(--font-mono);
  font-size: var(--text-lg);
  font-weight: var(--font-bold);
  color: var(--gray-900);
}
.modal-btns {
  display: flex;
  flex-direction: row;
  gap: var(--space-3);
  width: 100%;
}
.modal-btns .btn-primary,
.modal-btns .btn-secondary { flex: 1; }
.modal-btns:has(:only-child) .btn-primary { flex: none; width: 100%; }
.modal-stars {
  font-size: 28px;
  letter-spacing: 4px;
  line-height: 1;
}

/* ── 连击提示 ── */
.combo-popup {
  position: fixed;
  pointer-events: none;
  font-size: 22px;
  font-weight: var(--font-bold);
  color: var(--color-accent);
  z-index: 50;
  animation: comboFloat 800ms ease forwards;
}
@keyframes comboFloat {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-48px) scale(1.3); }
}

/* ── 粒子爆炸 ── */
.particle {
  position: fixed;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  animation: particleFly var(--dur, 0.55s) ease-out forwards;
}
@keyframes particleFly {
  0%   { transform: translate(0, 0) scale(1);   opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0.2); opacity: 0; }
}

/* ── 响应式（格子尺寸全部由 JS fitBoardToScreen 控制）── */
@media (max-width: 767px) {
  .header { height: 48px; }
  .header h1 { font-size: 24px; }
  .hud { height: 64px; }
}
@media (max-width: 479px) {
  .main { padding: var(--space-3) var(--space-2) var(--space-6); gap: var(--space-3); }
  .hud  { height: 56px; padding: 0 var(--space-3); }
  .score-group { display: none; }
  .btn-secondary { padding: 0 var(--space-4); }
}

/* 移动端基础优化 */
.board, .tile {
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
.board { touch-action: none; }
</style>
</head>
<body>

<!-- 顶栏 -->
<header class="header">
  <h1>水果连连看</h1>
  <button class="sound-btn" id="soundBtn" title="音效开关">🔊</button>
</header>

<!-- 主区域 -->
<main class="main">
  <!-- HUD -->
  <div class="hud">
    <div class="hud-left">
      <span class="timer-icon">⏱</span>
      <span class="timer" id="timerDisplay">02:30</span>
    </div>
    <div class="hud-center">
      <div class="level-badge" id="levelBadge">第 1 关</div>
      <div class="level-label" id="levelLabel">新手热身</div>
    </div>
    <div class="hud-right">
      <div class="score-group">
        <div class="score-label">得分</div>
        <div class="score-value" id="scoreDisplay">0</div>
      </div>
      <button class="icon-btn" id="hintBtn" title="提示（剩余3次）">
        💡
        <span class="badge" id="hintBadge">3</span>
      </button>
      <button class="icon-btn" id="shuffleBtn" title="洗牌（剩余2次）">
        🔀
        <span class="badge" id="shuffleBadge">2</span>
      </button>
    </div>
  </div>

  <!-- 棋盘 -->
  <div class="board-wrapper">
    <!-- 无路可走 Toast -->
    <div class="no-moves-toast" id="noMovesToast">
      <div class="toast-left">
        <span>⚠</span>
        <span>无路可走</span>
      </div>
      <div class="toast-actions">
        <button class="toast-shuffle-btn" id="toastShuffleBtn">洗牌</button>
        <button class="toast-close" id="toastClose">✕</button>
      </div>
    </div>

    <!-- SVG 连线层 -->
    <svg id="line-svg"></svg>

    <!-- 棋盘格子由 JS 生成 -->
    <div class="board" id="board"></div>
  </div>

  <!-- 底部按钮 -->
  <div class="bottom-bar">
    <button class="btn-secondary" id="restartBtn">重新开始</button>
  </div>
</main>

<!-- 通关弹窗 -->
<div class="overlay" id="victoryOverlay">
  <div class="modal">
    <div class="modal-icon success">✅</div>
    <div class="modal-title success">第 <span id="victoryLevel">1</span> 关通过！</div>
    <div class="modal-sub" id="victorySub">新手热身</div>
    <div class="modal-stars" id="victoryStars">⭐⭐⭐</div>
    <div class="modal-stats">
      <div class="stat-item">
        <div class="stat-label">用时</div>
        <div class="stat-value" id="victoryTime">--</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">本关得分</div>
        <div class="stat-value" id="victoryScore">--</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">历史最高</div>
        <div class="stat-value" id="victoryBest">--</div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" id="victoryRestart">重新开始</button>
      <button class="btn-primary" id="victoryNext">下一关 →</button>
    </div>
  </div>
</div>

<!-- 超时弹窗 -->
<div class="overlay" id="timeoutOverlay">
  <div class="modal">
    <div class="modal-icon danger">❌</div>
    <div class="modal-title danger">时间到了！</div>
    <div class="modal-sub" id="timeoutSub">还剩 0 个图案未消除</div>
    <div class="modal-stats">
      <div class="stat-item">
        <div class="stat-label">本局得分</div>
        <div class="stat-value" id="timeoutScore">--</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">历史最高</div>
        <div class="stat-value" id="timeoutBest">--</div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-primary" id="timeoutRestart">再来一局</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  常量与配置
// ═══════════════════════════════════════
const ROWS = 8;
const COLS = 8;
const TOTAL_TILES = ROWS * COLS;   // 64
const PAIR_COUNT  = TOTAL_TILES / 2; // 32 对

// 16 种图案，每种出现 4 次（16×4=64）
const EMOJIS = ['🍎','🍊','🍋','🍇','🍓','🍑','🍒','🥝','🍍','🍌','🍉','🍈','🫐','🥭','🍅','🥥'];

// ═══════════════════════════════════════
//  关卡阶梯配置
// ═══════════════════════════════════════
const LEVEL_CONFIG = [
  { level: 1, time: 150, hint: 3, shuffle: 2, label: '新手热身' },
  { level: 2, time: 130, hint: 3, shuffle: 2, label: '小试牛刀' },
  { level: 3, time: 120, hint: 2, shuffle: 2, label: '渐入佳境' },
  { level: 4, time: 110, hint: 2, shuffle: 1, label: '步步为营' },
  { level: 5, time: 100, hint: 2, shuffle: 1, label: '紧张刺激' },
  { level: 6, time:  90, hint: 1, shuffle: 1, label: '高手过招' },
  { level: 7, time:  80, hint: 1, shuffle: 1, label: '极限挑战' },
  { level: 8, time:  70, hint: 1, shuffle: 0, label: '巅峰对决' },
];
function getLevelCfg(lv) {
  return LEVEL_CONFIG[Math.min(lv - 1, LEVEL_CONFIG.length - 1)];
}

// ═══════════════════════════════════════
//  游戏状态
// ═══════════════════════════════════════
let board        = [];   // [row][col] = emoji string or ''
let selected     = null; // {row, col}
let score        = 0;
let currentLevel = 1;
let timeLeft     = getLevelCfg(1).time;
let hintCount    = getLevelCfg(1).hint;
let shuffleCount = getLevelCfg(1).shuffle;
let gameStatus   = 'idle'; // idle / playing / cleared / timeout
let timerInterval = null;
let combo        = 0;
let lastComboTime = 0;
let soundEnabled = true;
let isAnimating  = false; // 连线动画进行中时锁定输入

// localStorage 最高分
let bestScore = parseInt(localStorage.getItem('llk_best') || '0', 10);

// ═══════════════════════════════════════
//  棋盘生成（从解态反向打乱，保证可解）
// ═══════════════════════════════════════
function generateBoard() {
  // 先构造图案列表：每种 emoji 出现 TOTAL_TILES/EMOJIS.length = 4 次
  const tiles = [];
  const perEmoji = TOTAL_TILES / EMOJIS.length; // 4
  for (const e of EMOJIS) {
    for (let i = 0; i < perEmoji; i++) tiles.push(e);
  }
  // Fisher-Yates 洗牌
  for (let i = tiles.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
  }
  // 填入棋盘
  const b = [];
  for (let r = 0; r < ROWS; r++) {
    b.push([]);
    for (let c = 0; c < COLS; c++) {
      b[r].push(tiles[r * COLS + c]);
    }
  }
  return b;
}

// 检查当前棋盘是否有可消除对
function hasMoves(b) {
  const cells = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (b[r][c]) cells.push([r, c]);

  for (let i = 0; i < cells.length; i++) {
    for (let j = i + 1; j < cells.length; j++) {
      const [r1, c1] = cells[i];
      const [r2, c2] = cells[j];
      if (b[r1][c1] === b[r2][c2] && canConnect(b, r1, c1, r2, c2)) return true;
    }
  }
  return false;
}

// 找一对可消除的格子（用于提示）
function findHintPair(b) {
  const cells = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (b[r][c]) cells.push([r, c]);

  for (let i = 0; i < cells.length; i++) {
    for (let j = i + 1; j < cells.length; j++) {
      const [r1, c1] = cells[i];
      const [r2, c2] = cells[j];
      if (b[r1][c1] === b[r2][c2] && canConnect(b, r1, c1, r2, c2))
        return [[r1, c1], [r2, c2]];
    }
  }
  return null;
}

// ═══════════════════════════════════════
//  连通性判定（最多 2 折角，可走棋盘外边界）
// ═══════════════════════════════════════

// 棋盘坐标 (r, c) 合法判断，允许 -1 和 ROWS/COLS（边界外一格）
function inBounds(r, c) {
  return r >= -1 && r <= ROWS && c >= -1 && c <= COLS;
}

// 检查点 (r,c) 是否可以通过（空格或棋盘边界外）
function isFree(b, r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return true; // 棋盘外
  return !b[r][c]; // 棋盘内必须为空
}

// 线段 (r1,c1)→(r2,c2) 方向上是否无障碍
// 注意：起终点不检测（允许格子本身有内容）
function lineBlocked(b, r1, c1, r2, c2) {
  if (r1 === r2) {
    const minC = Math.min(c1, c2), maxC = Math.max(c1, c2);
    for (let c = minC + 1; c < maxC; c++) {
      if (!isFree(b, r1, c)) return true;
    }
  } else if (c1 === c2) {
    const minR = Math.min(r1, r2), maxR = Math.max(r1, r2);
    for (let r = minR + 1; r < maxR; r++) {
      if (!isFree(b, r, c1)) return true;
    }
  }
  return false;
}

// 判断两格是否连通，同时返回路径折点（用于绘制）
// 返回 null 表示不连通，返回折点数组（不含两端格子中心）
function canConnect(b, r1, c1, r2, c2) {
  // 0 折角（直线）
  if (r1 === r2 || c1 === c2) {
    if (!lineBlocked(b, r1, c1, r2, c2)) return true;
  }

  // 1 折角（L 形，两种折角点）
  // 折角点 (r1, c2)
  if (isFree(b, r1, c2) && !lineBlocked(b, r1, c1, r1, c2) && !lineBlocked(b, r1, c2, r2, c2)) return true;
  // 折角点 (r2, c1)
  if (isFree(b, r2, c1) && !lineBlocked(b, r1, c1, r2, c1) && !lineBlocked(b, r2, c1, r2, c2)) return true;

  // 2 折角（Z/S 形）：枚举两个折点
  // 水平方向枚举折行
  for (let r = -1; r <= ROWS; r++) {
    if (r === r1 || r === r2) continue;
    const p1 = [r, c1], p2 = [r, c2];
    if (isFree(b, p1[0], p1[1]) && isFree(b, p2[0], p2[1])
      && !lineBlocked(b, r1, c1, p1[0], p1[1])
      && !lineBlocked(b, p1[0], p1[1], p2[0], p2[1])
      && !lineBlocked(b, p2[0], p2[1], r2, c2)) {
      return true;
    }
  }
  // 垂直方向枚举折列
  for (let c = -1; c <= COLS; c++) {
    if (c === c1 || c === c2) continue;
    const p1 = [r1, c], p2 = [r2, c];
    if (isFree(b, p1[0], p1[1]) && isFree(b, p2[0], p2[1])
      && !lineBlocked(b, r1, c1, p1[0], p1[1])
      && !lineBlocked(b, p1[0], p1[1], p2[0], p2[1])
      && !lineBlocked(b, p2[0], p2[1], r2, c2)) {
      return true;
    }
  }

  return false;
}

// 获取路径折点列表（用于绘制 SVG，含起点和终点）
function getPath(b, r1, c1, r2, c2) {
  const start = [r1, c1], end = [r2, c2];

  // 0 折角
  if (r1 === r2 || c1 === c2) {
    if (!lineBlocked(b, r1, c1, r2, c2)) return [start, end];
  }

  // 1 折角
  if (isFree(b, r1, c2) && !lineBlocked(b, r1, c1, r1, c2) && !lineBlocked(b, r1, c2, r2, c2))
    return [start, [r1, c2], end];
  if (isFree(b, r2, c1) && !lineBlocked(b, r1, c1, r2, c1) && !lineBlocked(b, r2, c1, r2, c2))
    return [start, [r2, c1], end];

  // 2 折角 - 水平
  for (let r = -1; r <= ROWS; r++) {
    if (r === r1 || r === r2) continue;
    const p1 = [r, c1], p2 = [r, c2];
    if (isFree(b, p1[0], p1[1]) && isFree(b, p2[0], p2[1])
      && !lineBlocked(b, r1, c1, p1[0], p1[1])
      && !lineBlocked(b, p1[0], p1[1], p2[0], p2[1])
      && !lineBlocked(b, p2[0], p2[1], r2, c2)) {
      return [start, p1, p2, end];
    }
  }
  // 2 折角 - 垂直
  for (let c = -1; c <= COLS; c++) {
    if (c === c1 || c === c2) continue;
    const p1 = [r1, c], p2 = [r2, c];
    if (isFree(b, p1[0], p1[1]) && isFree(b, p2[0], p2[1])
      && !lineBlocked(b, r1, c1, p1[0], p1[1])
      && !lineBlocked(b, p1[0], p1[1], p2[0], p2[1])
      && !lineBlocked(b, p2[0], p2[1], r2, c2)) {
      return [start, p1, p2, end];
    }
  }
  return null;
}

// ═══════════════════════════════════════
//  动态计算格子尺寸，确保棋盘完整显示
// ═══════════════════════════════════════
function fitBoardToScreen() {
  const COLS_COUNT   = 8;
  const BOARD_PAD    = 12;  // .board padding (--space-3) 单侧
  const MAIN_PAD     = 8;   // .main 最小左右 padding 单侧（小屏用 --space-2）

  // 可用宽度：屏幕宽 or 最大容器宽 660，减去两侧页边距和棋盘内边距
  const vw       = Math.min(window.innerWidth, 660);
  const availW   = vw - MAIN_PAD * 2 - BOARD_PAD * 2;

  // gap 跟屏幕宽自适应
  const gap      = vw < 400 ? 3 : 4;
  const tileSize = Math.floor((availW - gap * (COLS_COUNT - 1)) / COLS_COUNT);

  // 始终写入，不加条件——CSS 媒体查询值作为默认兜底
  boardEl.style.setProperty('--tile-size', tileSize + 'px');
  boardEl.style.setProperty('--tile-gap',  gap + 'px');
  boardEl.style.fontSize = Math.round(tileSize * 0.58) + 'px';
}

// ═══════════════════════════════════════
//  DOM 操作
// ═══════════════════════════════════════
const boardEl        = document.getElementById('board');
const timerEl        = document.getElementById('timerDisplay');
const scoreEl        = document.getElementById('scoreDisplay');
const hintBadgeEl    = document.getElementById('hintBadge');
const shuffleBadgeEl = document.getElementById('shuffleBadge');
const hintBtn        = document.getElementById('hintBtn');
const shuffleBtn     = document.getElementById('shuffleBtn');
const noMovesToast   = document.getElementById('noMovesToast');
const lineSvg        = document.getElementById('line-svg');

function getTileEl(r, c) {
  return boardEl.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
}

function renderBoard() {
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const el = document.createElement('div');
      el.className = 'tile';
      el.dataset.r = r;
      el.dataset.c = c;
      const emoji = board[r][c];
      if (emoji) {
        el.textContent = emoji;
      } else {
        el.classList.add('tile--empty');
      }
      bindTileEvents(el, r, c);
      boardEl.appendChild(el);
    }
  }
  // DOM 渲染完成后再测量并缩放
  requestAnimationFrame(fitBoardToScreen);
}

// 绑定触摸 + 点击（消除移动端 300ms 延迟，防双触发）
function bindTileEvents(el, r, c) {
  let touchMoved = false;
  let touchHandled = false;
  el.addEventListener('touchstart', () => {
    touchMoved = false;
    touchHandled = false;
  }, { passive: true });
  el.addEventListener('touchmove', () => {
    touchMoved = true;
  }, { passive: true });
  el.addEventListener('touchend', (e) => {
    if (touchMoved) return;
    e.preventDefault();
    touchHandled = true;
    onTileClick(r, c);
  }, { passive: false });
  el.addEventListener('click', () => {
    if (touchHandled) { touchHandled = false; return; }
    onTileClick(r, c);
  });
}

function updateTile(r, c) {
  const el = getTileEl(r, c);
  if (!el) return;
  el.className = 'tile';
  el.removeEventListener('animationend', el._onAnimEnd);
  const emoji = board[r][c];
  if (emoji) {
    el.textContent = emoji;
  } else {
    el.textContent = '';
    el.classList.add('tile--empty');
  }
}

// ═══════════════════════════════════════
//  格子坐标 → SVG 坐标（棋盘中心）
// ═══════════════════════════════════════
function tileCenter(r, c) {
  const boardRect = boardEl.getBoundingClientRect();
  const wrapRect  = boardEl.parentElement.getBoundingClientRect();
  const tile = getTileEl(r, c);
  if (tile) {
    const tileRect = tile.getBoundingClientRect();
    return {
      x: tileRect.left + tileRect.width  / 2 - wrapRect.left,
      y: tileRect.top  + tileRect.height / 2 - wrapRect.top
    };
  }
  // fallback：从 grid 布局推算（用于越界点）
  const tileSize = parseFloat(getComputedStyle(boardEl).getPropertyValue('--tile-size')) || 72;
  const tileGap  = parseFloat(getComputedStyle(boardEl).getPropertyValue('--tile-gap'))  || 6;
  const padding  = parseFloat(getComputedStyle(boardEl).paddingLeft) || 12;
  const ox = boardRect.left - wrapRect.left + padding;
  const oy = boardRect.top  - wrapRect.top  + padding;
  return {
    x: ox + c * (tileSize + tileGap) + tileSize / 2,
    y: oy + r * (tileSize + tileGap) + tileSize / 2
  };
}

// 将 [row, col] 路径点转为像素坐标
// 超出棋盘的点用外边界坐标代替
function pathToPixels(path) {
  return path.map(([r, c]) => {
    // 棋盘内正常格子
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
      return tileCenter(r, c);
    }
    // 棋盘外：需要估算位置
    const boardRect = boardEl.getBoundingClientRect();
    const wrapRect  = boardEl.parentElement.getBoundingClientRect();
    const tileSize  = parseFloat(getComputedStyle(boardEl).getPropertyValue('--tile-size')) || 72;
    const tileGap   = parseFloat(getComputedStyle(boardEl).getPropertyValue('--tile-gap'))  || 6;
    const padding   = parseFloat(getComputedStyle(boardEl).paddingLeft) || 12;
    const ox = boardRect.left - wrapRect.left + padding;
    const oy = boardRect.top  - wrapRect.top  + padding;
    // 箝制到边界外一格
    const clampedC = Math.max(-1, Math.min(COLS, c));
    const clampedR = Math.max(-1, Math.min(ROWS, r));
    return {
      x: ox + clampedC * (tileSize + tileGap) + tileSize / 2,
      y: oy + clampedR * (tileSize + tileGap) + tileSize / 2
    };
  });
}

// ═══════════════════════════════════════
//  SVG 连线动画
// ═══════════════════════════════════════
function drawLine(path, onDone) {
  lineSvg.innerHTML = '';
  const pixels = pathToPixels(path);

  // 构造 polyline 点串
  const pointsStr = pixels.map(p => `${p.x},${p.y}`).join(' ');

  // 计算总路径长度（近似）
  let totalLen = 0;
  for (let i = 1; i < pixels.length; i++) {
    const dx = pixels[i].x - pixels[i-1].x;
    const dy = pixels[i].y - pixels[i-1].y;
    totalLen += Math.sqrt(dx*dx + dy*dy);
  }

  const polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  polyline.setAttribute('points', pointsStr);
  polyline.setAttribute('fill', 'none');
  polyline.setAttribute('stroke', '#4A90D9');
  polyline.setAttribute('stroke-width', '3');
  polyline.setAttribute('stroke-linecap', 'round');
  polyline.setAttribute('stroke-linejoin', 'round');
  polyline.setAttribute('stroke-dasharray', totalLen);
  polyline.setAttribute('stroke-dashoffset', totalLen);

  // 起终点圆点
  [pixels[0], pixels[pixels.length - 1]].forEach(p => {
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', p.x);
    circle.setAttribute('cy', p.y);
    circle.setAttribute('r', '5');
    circle.setAttribute('fill', '#4A90D9');
    circle.style.opacity = '0';
    lineSvg.appendChild(circle);
    // 和线一起出现
    setTimeout(() => { circle.style.transition = 'opacity 50ms'; circle.style.opacity = '1'; }, 10);
  });

  lineSvg.appendChild(polyline);

  // 动画：200ms 绘制
  polyline.style.transition = 'stroke-dashoffset 200ms ease-out';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      polyline.setAttribute('stroke-dashoffset', '0');
    });
  });

  // 200ms 后：100ms 淡出
  setTimeout(() => {
    lineSvg.style.transition = 'opacity 100ms ease-in';
    lineSvg.style.opacity = '0';
    setTimeout(() => {
      lineSvg.innerHTML = '';
      lineSvg.style.opacity = '1';
      lineSvg.style.transition = '';
      onDone();
    }, 100);
  }, 200);
}

// ═══════════════════════════════════════
//  点击逻辑
// ═══════════════════════════════════════
function onTileClick(r, c) {
  if (gameStatus !== 'playing') return;
  if (isAnimating) return;
  if (!board[r][c]) return;

  if (!selected) {
    // 第一次点击
    selected = { r, c };
    getTileEl(r, c)?.classList.add('tile--selected');
    playSound('select');
    return;
  }

  // 点击同一格 → 取消选中
  if (selected.r === r && selected.c === c) {
    getTileEl(r, c)?.classList.remove('tile--selected');
    selected = null;
    return;
  }

  const { r: r1, c: c1 } = selected;

  // 不同图案 → 抖动目标格，保持选中
  if (board[r1][c1] !== board[r][c]) {
    shakeInvalid(r, c);
    return;
  }

  // 相同图案，尝试连通
  const path = getPath(board, r1, c1, r, c);
  if (!path) {
    // 不连通：两格抖动
    shakeInvalid(r1, c1);
    shakeInvalid(r, c);
    getTileEl(r1, c1)?.classList.remove('tile--selected');
    selected = { r, c };
    getTileEl(r, c)?.classList.add('tile--selected');
    return;
  }

  // 连通！开始消除动画
  selected = null;
  isAnimating = true;

  const el1 = getTileEl(r1, c1);
  const el2 = getTileEl(r, c);
  el1?.classList.remove('tile--selected');
  el2?.classList.remove('tile--selected');
  el1?.classList.add('tile--matched');
  el2?.classList.add('tile--matched');

  playSound('match');

  drawLine(path, () => {
    // 消除动画 + 粒子爆炸
    spawnParticles(el1);
    spawnParticles(el2);
    el1?.classList.add('tile--disappear');
    el2?.classList.add('tile--disappear');
    setTimeout(() => {
      board[r1][c1] = '';
      board[r][c]   = '';
      updateTile(r1, c1);
      updateTile(r, c);

      // 更新得分
      updateScore();

      isAnimating = false;

      // 检查通关
      if (isCleared()) {
        endGame('cleared');
        return;
      }

      // 检查无路可走
      if (!hasMoves(board)) {
        showNoMovesToast();
      }
    }, 150);
  });
}

function shakeInvalid(r, c) {
  const el = getTileEl(r, c);
  if (!el) return;
  el.classList.remove('tile--invalid');
  void el.offsetWidth; // reflow 强制重启动画
  el.classList.add('tile--invalid');
  setTimeout(() => el.classList.remove('tile--invalid'), 350);
  playSound('invalid');
}

// ═══════════════════════════════════════
//  得分
// ═══════════════════════════════════════
function updateScore() {
  const now = Date.now();
  // 连击：2 秒内再次消除算连击
  if (now - lastComboTime < 2000) {
    combo++;
  } else {
    combo = 1;
  }
  lastComboTime = now;

  const gained = 10 * combo;
  score += gained;
  scoreEl.textContent = score;

  if (combo > 1) {
    showComboPopup(`+${gained} x${combo}连击!`);
    playSound('combo', combo);
  }
}

function showComboPopup(text) {
  const el = document.createElement('div');
  el.className = 'combo-popup';
  el.textContent = text;
  // 出现在屏幕中央偏上
  el.style.left = '50%';
  el.style.top  = '40%';
  el.style.transform = 'translateX(-50%)';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// ═══════════════════════════════════════
//  通关 / 结束
// ═══════════════════════════════════════
function isCleared() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c]) return false;
  return true;
}

function remainingCount() {
  let n = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c]) n++;
  return n;
}

function endGame(reason) {
  gameStatus = reason;
  stopTimer();

  // 更新最高分
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('llk_best', bestScore);
  }

  if (reason === 'cleared') {
    const cfg = getLevelCfg(currentLevel);
    const elapsed = cfg.time - timeLeft;
    const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const ss = String(elapsed % 60).padStart(2, '0');
    // 星级：剩余时间比例决定，>60% 三星，>30% 二星，否则一星
    const ratio = timeLeft / cfg.time;
    const stars = ratio > 0.6 ? '⭐⭐⭐' : ratio > 0.3 ? '⭐⭐' : '⭐';
    document.getElementById('victoryLevel').textContent = currentLevel;
    document.getElementById('victorySub').textContent   = cfg.label;
    document.getElementById('victoryStars').textContent = stars;
    document.getElementById('victoryTime').textContent  = `${mm}:${ss}`;
    document.getElementById('victoryScore').textContent = score;
    document.getElementById('victoryBest').textContent  = bestScore;
    // 最后一关隐藏"下一关"
    const nextBtn = document.getElementById('victoryNext');
    nextBtn.style.display = currentLevel >= LEVEL_CONFIG.length ? 'none' : '';
    document.getElementById('victoryOverlay').classList.add('show');
    launchConfetti();
    playSound('victory');
  } else {
    // timeout
    const rem = remainingCount();
    document.getElementById('timeoutSub').textContent   = `还剩 ${rem} 个图案未消除`;
    document.getElementById('timeoutScore').textContent = score;
    document.getElementById('timeoutBest').textContent  = bestScore;
    document.getElementById('timeoutOverlay').classList.add('show');
    playSound('timeout');
  }
}

// ═══════════════════════════════════════
//  计时器
// ═══════════════════════════════════════
function startTimer() {
  stopTimer();
  timerInterval = setInterval(() => {
    if (gameStatus !== 'playing') { stopTimer(); return; }
    timeLeft--;
    renderTimer();
    if (timeLeft > 0 && timeLeft <= 10) playSound('tick');
    if (timeLeft <= 0) endGame('timeout');
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function renderTimer() {
  const mm = String(Math.floor(timeLeft / 60)).padStart(2, '0');
  const ss = String(timeLeft % 60).padStart(2, '0');
  timerEl.textContent = `${mm}:${ss}`;
  timerEl.className = 'timer';
  if (timeLeft <= 10) timerEl.classList.add('danger');
  else if (timeLeft <= 30) timerEl.classList.add('warning');
}

// ═══════════════════════════════════════
//  提示
// ═══════════════════════════════════════
function doHint() {
  if (hintCount <= 0 || gameStatus !== 'playing') return;
  hintCount--;
  hintBadgeEl.textContent = hintCount;
  if (hintCount === 0) hintBtn.disabled = true;

  const pair = findHintPair(board);
  if (!pair) { showNoMovesToast(); return; }
  playSound('hint');

  const [[r1, c1], [r2, c2]] = pair;
  const el1 = getTileEl(r1, c1);
  const el2 = getTileEl(r2, c2);

  [el1, el2].forEach(el => {
    if (!el) return;
    el.classList.remove('tile--hint');
    void el.offsetWidth;
    el.classList.add('tile--hint');
    setTimeout(() => el.classList.remove('tile--hint'), 1900);
  });
}

// ═══════════════════════════════════════
//  洗牌
// ═══════════════════════════════════════
function doShuffle() {
  if (shuffleCount <= 0 || gameStatus !== 'playing' || isAnimating) return;
  shuffleCount--;
  shuffleBadgeEl.textContent = shuffleCount;
  if (shuffleCount === 0) shuffleBtn.disabled = true;

  hideNoMovesToast();
  playSound('shuffle');
  isAnimating = true;

  // 1. 收集所有有内容的牌：位置 + emoji
  const activeTiles = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!board[r][c]) continue;
      const el = getTileEl(r, c);
      if (!el) continue;
      const rect = el.getBoundingClientRect();
      activeTiles.push({ r, c, emoji: board[r][c], rect, el });
    }
  }

  // 2. Fisher-Yates 打乱顺序，得到"飞向目标"的映射
  const shuffled = activeTiles.map(t => ({ r: t.r, c: t.c }));
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  // 3. 隐藏原始牌
  activeTiles.forEach(t => { t.el.style.opacity = '0'; });

  // 4. 为每张牌创建飞行克隆，从起点飞向终点
  const DURATION = 480;
  activeTiles.forEach((src, i) => {
    const dst = activeTiles[shuffled[i].r * COLS + shuffled[i].c]
      ?? activeTiles.find(t => t.r === shuffled[i].r && t.c === shuffled[i].c);

    // 找到目标格的屏幕位置
    const dstEl = getTileEl(shuffled[i].r, shuffled[i].c);
    const dstRect = dstEl ? dstEl.getBoundingClientRect() : src.rect;

    const clone = document.createElement('div');
    clone.textContent = src.emoji;
    clone.style.cssText = `
      position:fixed;
      left:${src.rect.left}px; top:${src.rect.top}px;
      width:${src.rect.width}px; height:${src.rect.height}px;
      display:flex; align-items:center; justify-content:center;
      font-size:${getComputedStyle(src.el).fontSize};
      background:var(--color-surface,#fff);
      border:2px solid var(--color-border,#e2e8f0);
      border-radius:10px;
      box-shadow:0 4px 16px rgba(0,0,0,0.18);
      z-index:8000;
      pointer-events:none;
      transition:left ${DURATION}ms cubic-bezier(0.4,0,0.2,1),
                 top  ${DURATION}ms cubic-bezier(0.4,0,0.2,1),
                 transform ${DURATION}ms cubic-bezier(0.4,0,0.2,1);
      will-change:left,top;
    `;
    document.body.appendChild(clone);

    // 触发飞行（下一帧）
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        clone.style.left = `${dstRect.left}px`;
        clone.style.top  = `${dstRect.top}px`;
        clone.style.transform = 'scale(1.08)';
        setTimeout(() => { clone.style.transform = 'scale(1)'; }, DURATION * 0.7);
      });
    });

    setTimeout(() => clone.remove(), DURATION + 60);
  });

  // 5. 飞行结束后原地更新内容，不重建 DOM（避免闪屏）
  setTimeout(() => {
    // 构造 (r,c) → 新 emoji 的映射
    // shuffled[i] 是 activeTiles[i] 的目标位置，即 activeTiles[i].emoji 飞向 shuffled[i]
    // 反过来：目标格 shuffled[i] 的新内容 = activeTiles[i].emoji
    const newBoard = board.map(row => [...row]);
    activeTiles.forEach((src, i) => {
      newBoard[shuffled[i].r][shuffled[i].c] = src.emoji;
    });
    board = newBoard;

    // 原地更新每格内容，恢复显示（无重建 DOM）
    activeTiles.forEach(t => {
      const el = getTileEl(t.r, t.c);
      if (el) el.style.opacity = '';
    });
    // 更新所有格子的文字（仅内容变化，不替换节点）
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const el = getTileEl(r, c);
        if (!el) continue;
        const emoji = board[r][c];
        if (emoji) {
          el.textContent = emoji;
          el.classList.remove('tile--empty');
          el.style.opacity = '';
        }
      }
    }

    isAnimating = false;
    if (!hasMoves(board)) showNoMovesToast();
  }, DURATION + 80);
}

// ═══════════════════════════════════════
//  无路可走 Toast
// ═══════════════════════════════════════
function showNoMovesToast() {
  noMovesToast.classList.add('show');
}
function hideNoMovesToast() {
  noMovesToast.classList.remove('show');
}

// ═══════════════════════════════════════
//  音效（Web Audio API 简易合成）
// ═══════════════════════════════════════
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, duration, type = 'sine', volume = 0.3) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch (e) {}
}
// ═══════════════════════════════════════
//  Confetti 彩条特效（通关专用）
// ═══════════════════════════════════════
const CONFETTI_COLORS = [
  '#4A90D9','#F5A623','#E53E3E','#38A169',
  '#805AD5','#F6E05E','#ED64A6','#63B3ED',
  '#FC8181','#68D391','#76E4F7','#FBD38D',
];

function launchConfetti() {
  const W = window.innerWidth;
  const count = 120;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';

    // 随机尺寸：细长矩形或小正方形
    const wide  = Math.random() > 0.4;
    const w     = wide ? (6 + Math.random() * 6) : (7 + Math.random() * 5);
    const h     = wide ? (3 + Math.random() * 3) : w;
    const color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];

    // 起始 X：均匀分布在屏幕宽度，稍微随机偏移
    const startX = (W / count) * i + (Math.random() - 0.5) * (W / count) * 2;
    // 水平漂移 ±120px
    const tx     = (Math.random() - 0.5) * 240;
    // 下落距离：屏幕高度 + 超出一点
    const ty     = window.innerHeight + 40 + Math.random() * 100;
    // 旋转
    const rot0   = Math.random() * 360;
    const rot1   = rot0 + (Math.random() > 0.5 ? 1 : -1) * (360 + Math.random() * 720);
    // 时长和延迟：分批入场，营造持续感
    const dur    = 1.0 + Math.random() * 0.8;
    const delay  = Math.random() * 0.5;

    el.style.cssText = `
      left: ${startX}px;
      width: ${w}px; height: ${h}px;
      background: ${color};
      --cf-tx: ${tx}px; --cf-ty: ${ty}px;
      --cf-rot0: ${rot0}deg; --cf-rot1: ${rot1}deg;
      --cf-dur: ${dur}s; --cf-delay: ${delay}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), (dur + delay) * 1000 + 100);
  }
}

// ═══════════════════════════════════════
//  粒子爆炸特效
// ═══════════════════════════════════════
const PARTICLE_COLORS = ['#4A90D9','#F5A623','#E53E3E','#38A169','#805AD5','#F6E05E','#ED64A6','#63B3ED'];

function spawnParticles(el) {
  if (!el) return;
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;
  const count = 10;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (2 * Math.PI / count) * i + (Math.random() - 0.5) * 0.6;
    const dist  = 38 + Math.random() * 32;
    const tx    = Math.cos(angle) * dist;
    const ty    = Math.sin(angle) * dist;
    const dur   = 0.45 + Math.random() * 0.2;
    const color = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
    p.style.cssText = `
      left:${cx - 3.5}px; top:${cy - 3.5}px;
      background:${color};
      --tx:${tx}px; --ty:${ty}px; --dur:${dur}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), dur * 1000 + 50);
  }
}

function playSound(type, param) {
  switch (type) {
    case 'select':  playTone(880, 0.06, 'square', 0.12); break;
    case 'match':   playTone(523, 0.15, 'sine', 0.25); setTimeout(() => playTone(659, 0.15, 'sine', 0.25), 100); break;
    case 'combo': {
      // 连击每级音高递进，最高到 1200Hz
      const level = Math.min(param || 2, 8);
      const freqs = [784, 880, 988, 1047, 1109, 1175, 1245, 1319];
      const f = freqs[level - 2] || freqs[freqs.length - 1];
      playTone(f, 0.12, 'square', 0.2);
      setTimeout(() => playTone(f * 1.5, 0.1, 'sine', 0.15), 80);
      break;
    }
    case 'invalid': playTone(200, 0.2, 'sawtooth', 0.15); break;
    case 'hint':    playTone(1047, 0.08, 'sine', 0.18); setTimeout(() => playTone(784, 0.1, 'sine', 0.15), 70); break;
    case 'shuffle': [440, 554, 659].forEach((f, i) => setTimeout(() => playTone(f, 0.1, 'square', 0.15), i * 60)); break;
    case 'tick':    playTone(880, 0.05, 'square', 0.2); break;
    case 'victory': [523,659,784,1047].forEach((f, i) => setTimeout(() => playTone(f, 0.3, 'sine', 0.3), i * 120)); break;
    case 'timeout': playTone(220, 0.5, 'sawtooth', 0.2); break;
  }
}

// ═══════════════════════════════════════
//  开始 / 重置游戏
// ═══════════════════════════════════════
function startGame(level) {
  if (level !== undefined) currentLevel = level;
  const cfg = getLevelCfg(currentLevel);

  // 重置状态
  score        = 0;
  timeLeft     = cfg.time;
  hintCount    = cfg.hint;
  shuffleCount = cfg.shuffle;
  combo        = 0;
  lastComboTime = 0;
  selected     = null;
  isAnimating  = false;
  gameStatus   = 'playing';

  // 生成棋盘（最多尝试 10 次直到有解）
  let attempts = 0;
  do {
    board = generateBoard();
    attempts++;
  } while (!hasMoves(board) && attempts < 10);

  // 更新 UI
  scoreEl.textContent        = '0';
  hintBadgeEl.textContent    = cfg.hint;
  shuffleBadgeEl.textContent = cfg.shuffle;
  hintBtn.disabled           = cfg.hint === 0;
  shuffleBtn.disabled        = cfg.shuffle === 0;
  document.getElementById('levelBadge').textContent = `第 ${currentLevel} 关`;
  document.getElementById('levelLabel').textContent = cfg.label;
  renderTimer();
  renderBoard();
  hideNoMovesToast();
  lineSvg.innerHTML = '';

  // 关闭弹窗
  document.getElementById('victoryOverlay').classList.remove('show');
  document.getElementById('timeoutOverlay').classList.remove('show');

  startTimer();
}

// ═══════════════════════════════════════
//  事件绑定
// ═══════════════════════════════════════
document.getElementById('restartBtn').addEventListener('click', () => startGame(1));
document.getElementById('victoryRestart').addEventListener('click', () => startGame(1));
document.getElementById('victoryNext').addEventListener('click', () => startGame(currentLevel + 1));
document.getElementById('timeoutRestart').addEventListener('click', () => startGame(currentLevel));
hintBtn.addEventListener('click', doHint);
shuffleBtn.addEventListener('click', doShuffle);
document.getElementById('toastClose').addEventListener('click', hideNoMovesToast);
document.getElementById('toastShuffleBtn').addEventListener('click', () => {
  hideNoMovesToast();
  doShuffle();
});

// 音效按钮
const soundBtnEl = document.getElementById('soundBtn');
soundBtnEl.addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  soundBtnEl.textContent = soundEnabled ? '🔊' : '🔇';
  localStorage.setItem('llk_sound', soundEnabled ? '1' : '0');
});
// 恢复音效偏好
soundEnabled = localStorage.getItem('llk_sound') !== '0';
soundBtnEl.textContent = soundEnabled ? '🔊' : '🔇';

// 阻止触摸棋盘时页面滚动
boardEl.addEventListener('touchmove', (e) => {
  e.preventDefault();
}, { passive: false });

// 屏幕旋转 / 窗口变化时重新缩放
window.addEventListener('resize', fitBoardToScreen);

// ═══════════════════════════════════════
//  启动
// ═══════════════════════════════════════
startGame(1);
